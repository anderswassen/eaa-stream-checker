    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the European Accessibility Act (EAA)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The European Accessibility Act (EAA), EU Directive 2019/882, requires digital services including streaming platforms to meet accessibility standards by June 28, 2025. It mandates compliance with EN 301 549, which includes WCAG 2.2 AA for web content and Clause 7 requirements for video player accessibility, captions, and audio description."
          }
        },
        {
          "@type": "Question",
          "name": "What is EN 301 549?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "EN 301 549 is the European harmonised standard for ICT accessibility. It maps WCAG 2.2 AA success criteria to Clause 9 (web content) and adds Clause 7 requirements specific to video and streaming: caption playback, audio description, player keyboard navigation, and accessible controls."
          }
        },
        {
          "@type": "Question",
          "name": "How does EAA Checker test streaming services?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "EAA Checker launches a real browser, loads your streaming site, runs axe-core WCAG 2.2 AA analysis, detects video players (hls.js, dash.js, Shaka, Video.js, JW Player, etc.), intercepts HLS/DASH manifests, checks for captions, audio description, sign language tracks, tests player keyboard accessibility, and maps all findings to EN 301 549 clauses."
          }
        },
        {
          "@type": "Question",
          "name": "Is EAA Checker free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, EAA Checker is completely free. You can scan any streaming service URL and receive a full EN 301 549 compliance report with exportable PDF and VPAT formats."
          }
        }
      ]
    }
